name: CI
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --locked
      - name: doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
      # Quality gates run locally via prek pre-push hook.
      # Re-add as a CI step once needed.

  hooks:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: install prek
        run: |
          curl -LsSf https://github.com/j178/prek/releases/latest/download/prek-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: validate hook config
        run: prek validate-config .pre-commit-config.yaml
