name: Dogfood

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build cairn
        run: cargo build --release

      - name: Install cairn
        run: cargo install --path . --force

      - name: Run dogfood gate
        run: ./scripts/dogfood.sh
