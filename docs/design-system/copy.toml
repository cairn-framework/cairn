body = "Artefacts failed to load. Check the cairn ui server, then reselect the node."
cta = ""

[empty-states.cli-no-blueprint]
heading = "No blueprint found"
body = "No cairn.blueprint found. Inspection has nothing to look at."
cta = "Run `cairn init` to scaffold a blueprint, then re-run `cairn check`."

[empty-states.cli-clean-map]
heading = "Blueprint clean"
body = "Blueprint reconciled cleanly. No findings."
cta = ""

# -- Findings -----------------------------------------------------------

[findings]

[findings.severity]
error = "Error: a blocking issue that must be resolved."
warning = "Warning: a potential issue worth reviewing."
info = "Info: an observation with no required action."

[findings.types]
orphaned-file = "A source file exists but no node owns its path."
ghost-node = "A declared node has no source files on disk."
missing-edge = "An observed dependency has no declared blueprint edge."
extra-edge = "A declared edge has no observed source dependency."
interface-contradiction = "Multiple contracts for the same role have divergent interfaces."
rationale-tension = "An intentional asymmetry was detected; review the rationale."

[findings.codes]
CAIRN_RECONCILE_ORPHANED_FILE = { heading = "Orphaned file", body = "The file `{path}` exists on disk but no blueprint node claims its path.", cta = "Add a `path` entry to an existing node, or declare a new node." }
CAIRN_INTEGRITY_DUPLICATE_ID = { heading = "Duplicate node ID", body = "The ID `{node}` appears more than once in the blueprint.", cta = "Rename one of the duplicates to make every ID unique." }
CAIRN_INTEGRITY_INVALID_EDGE_ENDPOINT = { heading = "Invalid edge endpoint", body = "An edge references `{target}`, which does not exist in the map.", cta = "Check the edge declaration for typos, or declare the missing node." }
CAIRN_INTEGRITY_PATH_TIE = { heading = "Path ownership conflict", body = "Multiple nodes claim the path `{path}`.", cta = "Narrow one node's path pattern so each file has exactly one owner." }
CAIRN_INTERFACE_HASH_CHANGED = { heading = "Interface changed", body = "The contract hash for `{node}` no longer matches the last recorded value.", cta = "Run `cairn scan` to accept the new hash, or revert the contract change." }
CAIRN_ORDER_CYCLE = { heading = "Dependency cycle", body = "A cycle was detected involving `{node}`.", cta = "Break the cycle by removing or reversing one edge." }
CAIRN_CONTRACT_MISSING = { heading = "Missing contract", body = "Node `{node}` has no contract file.", cta = "Create a contract artefact describing this node's interface." }
CAIRN_SOURCE_UNVERIFIED = { heading = "Unverified source", body = "Source `{node}` has not been verified against its declared hash.", cta = "Run `cairn scan` to verify, or update the source record." }
CAIRN_DECISION_ORPHANED = { heading = "Orphaned decision", body = "Decision `{node}` references nodes that no longer exist.", cta = "Update the decision's node references, or archive if no longer relevant." }
CAIRN_PROVENANCE_NO_DECISION = { heading = "No decision link", body = "Node `{node}` has no decision in its provenance chain.", cta = "Link a decision artefact explaining why this module exists." }
CAIRN_CONTRACT_MISSING_NODE = { heading = "Contract references unknown node", body = "A contract references `{node}`, which does not exist in the blueprint.", cta = "Fix the node reference in the contract, or declare the missing node." }


CT001 = { heading = "Interface contradiction", body = "Targets for `{node}` with the same contract role have divergent interfaces.", cta = "Review the contract and reconcile the interface shapes." }
CT002 = { heading = "Intentional asymmetry", body = "An intentional asymmetry was detected in `{node}` for contract role `{target}`.", cta = "Review the rationale to confirm the asymmetry is still correct." }
# -- Init ---------------------------------------------------------------

[init]
done = "initialized Cairn project"
next-steps = """
Next steps:
  1. Describe your system in cairn.blueprint (a starter was written)
  2. Run `cairn scan` to reconcile the blueprint against your code
  3. Append .cairn/AGENTS.md to your agent instructions (CLAUDE.md or AGENTS.md)

Existing codebase? `cairn init --from-code` discovers modules for you."""

# -- Feedback -------------------------------------------------------------

[feedback]
usage = "usage: cairn feedback \"<what you expected, what happened instead>\""
recorded = "Feedback recorded in .cairn/feedback.md"
cta = "File it upstream when convenient:"

# -- Errors -------------------------------------------------------------

[errors]
usage = "usage: cairn <command> [--file path] [--json]"
unknown-command = "unknown command"
migrate-dsl = "No blueprint file was found. Rename `cairn.dsl` to `cairn.blueprint`."

# -- Decision scaffold --------------------------------------------------

[decision]
usage = "usage: cairn decision new <slug> [--node <id>] [--informed-by <id>]"
invalid-slug = "decision slug must be kebab-case: lowercase letters and digits separated by single hyphens"
exists = "a decision already exists at meta/decisions/dec.{slug}.md"
created = "created meta/decisions/dec.{slug}.md; add the governing node id(s) and fill the sections, then run `cairn scan`"


# -- Brief (fused next-unit orientation) --------------------------------

[brief]
gates = """
Gates that will judge this unit (all must pass before merge):
  cargo build                                          # zero warnings
  cargo clippy --all-targets --all-features -- -D warnings
  cargo test
  cairn scan                                           # zero findings
  cairn hook all                                       # exit 0"""
staleness-note = "Note: the beads export can lag live Dolt. `bd ready` is authoritative; cross-check before committing to this unit."
unlinked-hint = "No graph node is linked to this bead, so no node-specific decisions or contract are surfaced. Bind one with `bd update {id} --label cairn-node:<node>` so future briefs load its constraints."
not-found = "No bead matches `{id}`. Run `bd ready` to list available work."
empty = "Nothing to do. The backlog is empty and the project is clean."
none-ready = "No ready work: every open bead is blocked by a dependency. Run `bd ready` and `bd blocked` to see what is gated."
not-ready = "Warning: this bead is not in the ready set (closed, or blocked by an open dependency). It may already be done or not yet actionable; check `bd ready` before working it."