# User-facing CLI copy, externalised from source.
# Consumed at compile time via include_str! in src/cli/copy.rs.
#
# Conventions:
#   - No em-dashes. Use period, colon, comma, or parenthesis.
#   - Plain, concise English accessible to non-developers.
#   - Placeholders use {name} syntax (expanded by callers, not by the lookup helper).

# -- Empty states -------------------------------------------------------

[empty-states.no-blueprint]
heading = "No blueprint found"
body = "No cairn.blueprint found. Run `cairn init` to create one."
cta = "cairn init"

[empty-states.no-findings]
heading = "No findings"
body = "No findings to report."
cta = "cairn scan"

[empty-states.no-nodes]
heading = "No nodes"
body = "No nodes declared in the blueprint."
cta = "cairn init"

[empty-states.node-no-paths]
heading = "No paths declared"
body = "This node has no source paths declared."
cta = "cairn get <node>"

[empty-states.node-no-contracts]
heading = "No contracts"
body = "No contracts are attached to this node."
cta = "cairn contract <node>"

[empty-states.node-no-decisions]
heading = "No decisions"
body = "No decisions reference this node."
cta = "cairn decisions <node>"

[empty-states.node-no-todos]
heading = "No tasks"
body = "No open tasks for this node."
cta = "cairn todos <node>"

[empty-states.node-no-beads]
heading = "No beads"
body = "No beads link to this node."
cta = "bd ready"

[empty-states.node-no-research]
heading = "No research"
body = "No research artefacts link to this node."
cta = "cairn research <node>"

[empty-states.node-no-sources]
heading = "No sources"
body = "No source artefacts reference this node."
cta = "cairn sources <node>"

[empty-states.node-no-outbound]
heading = "No outbound dependencies"
body = "This node has no outbound dependencies."
