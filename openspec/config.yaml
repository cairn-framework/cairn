schema: spec-driven

# Project context shown to AI when creating artifacts.
context: |
  CAIRN is a Rust framework that connects past decisions, present code, and future intent.
  See docs/spec.md (canonical), CLAUDE.md (orientation), AGENTS.md (codex orientation).

  Tech stack:
    - Rust kernel (src/), embedded webui (src/ui_assets/), Python tooling (scripts/)
    - OpenSpec changes orchestrated by cflx (Conflux), config in .cflx.jsonc
    - Design system tokens in docs/design-system/tokens.css

  Architecture: two chains meeting at a hinge. Provenance flows in (source, research, decision).
  Authority flows out (decision, blueprint, contract, code). Do not flatten the taxonomy.

  Terminology (post phase-2.6 rename):
    - blueprint (not DSL), .blueprint files (not .dsl)
    - map (not ontology)
    - map.md (not index.md)

  Style:
    - Em-dashes are banned in all user-facing copy. Use period, colon, comma, or parenthesis.
    - UI changes pull from docs/design-system/tokens.css. No hardcoded hex or rem values.

  Verification gate (every phase): cargo build (zero warnings), cargo clippy --all-targets
  --all-features with -D warnings, cargo fmt --check, cargo test, cargo test --locked,
  cflx.py validate <phase> --strict.

# Per-artifact rules.
rules:
  proposal:
    - State the why and the user-visible change in plain English. The audience includes non-devs.
    - Avoid em-dashes.
  tasks:
    - Mark test-first pre-phases (phase-N.0-tests) as `#[ignore = "awaits phase-N"]` until the feature lands.
    - Each task must be independently runnable and verifiable.
  design:
    - Cite docs/spec.md sections by section number, not by paraphrase.
